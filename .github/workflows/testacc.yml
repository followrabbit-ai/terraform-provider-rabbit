name: testacc

# Acceptance suite — drives the provider against the live dev Rabbit backend.
# Triggers:
#   * push to master (catches behaviour regressions before any consumer can
#     terraform init the next release).
#   * workflow_dispatch (on-demand, e.g. before cutting a release).
#
# Auth: WIF_PROVIDER + WIF_SERVICE_ACCOUNT secrets (set up by
# followrabbit-ai/gcp-foundation org_core/terraform_provider_rabbit_testacc_cicd.tf)
# plus RABBIT_TEST_IMPERSONATE_TARGET_EMAIL secret naming a seeded admin user
# on the test tenant, plus the RABBIT_* repo variables.
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  acc:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      RABBIT_ENDPOINT: ${{ vars.RABBIT_ENDPOINT }}
      RABBIT_AUDIENCE: ${{ vars.RABBIT_AUDIENCE }}
      RABBIT_TEST_DOMAIN_ID: ${{ vars.RABBIT_TEST_DOMAIN_ID }}
      RABBIT_TEST_ALLOWED_DOMAINS: ${{ vars.RABBIT_TEST_ALLOWED_DOMAINS }}
      RABBIT_TEST_IMPERSONATE_SA_EMAIL: ${{ vars.RABBIT_TEST_IMPERSONATE_SA_EMAIL }}
      RABBIT_TEST_IMPERSONATE_TARGET_EMAIL: ${{ secrets.RABBIT_TEST_IMPERSONATE_TARGET_EMAIL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: make testacc
