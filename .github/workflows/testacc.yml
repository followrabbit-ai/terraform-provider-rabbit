name: testacc

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  acc:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      # All Rabbit-specific values come from repository variables / secrets so
      # nothing about the test tenant is baked into the workflow file.
      RABBIT_ENDPOINT: ${{ vars.RABBIT_ENDPOINT }}
      RABBIT_AUDIENCE: ${{ vars.RABBIT_AUDIENCE }}
      RABBIT_TEST_DOMAIN_ID: ${{ vars.RABBIT_TEST_DOMAIN_ID }}
      RABBIT_TEST_ALLOWED_DOMAINS: ${{ vars.RABBIT_TEST_ALLOWED_DOMAINS }}
      RABBIT_TEST_IMPERSONATE_SA_EMAIL: ${{ vars.RABBIT_TEST_IMPERSONATE_SA_EMAIL }}
      RABBIT_TEST_IMPERSONATE_TARGET_EMAIL: ${{ secrets.RABBIT_TEST_IMPERSONATE_TARGET_EMAIL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: make testacc
